name: Update Knesset Dashboard

on:
  schedule:
    # 03:20 UTC = 06:20 Israel time (UTC+3 summer) / 05:20 Israel time (UTC+2 winter)
    - cron: "20 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (scheduled — with email)
        if: github.event_name == 'schedule'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GITHUB_PAGES_URL: https://izikdaniel-alt.github.io/knesset-committee-tracker
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python knesset_monitor.py

      - name: Run monitor (manual — dashboard only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_PAGES_URL: https://izikdaniel-alt.github.io/knesset-committee-tracker
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python knesset_monitor.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html docs/history.json
          git diff --staged --quiet || git commit -m "update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
